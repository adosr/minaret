<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Minaret Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#F2F2F6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Minaret Admin" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="apple-touch-icon" href="../img/iphone-180-app-icon.png">
  <script>
    (function () {
      const preferredLang =
        (navigator.languages && navigator.languages[0]) ||
        navigator.language ||
        "en";

      const isArabic = preferredLang.toLowerCase().startsWith("ar");

      document.documentElement.lang = isArabic ? "ar" : "en";
      document.documentElement.dir = isArabic ? "rtl" : "ltr";
      document.documentElement.classList.add("preinit");
    })();
  </script>
  <style>
    html.preinit body {
      visibility: hidden;
    }
  </style>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="app-bg" aria-hidden="true"></div>
  <div class="app-shell admin-shell">
    <header>
      <div class="header-left">
        <p id="adminLocationLabel">Minaret Admin</p>
        <h1 id="adminTitle">Notification Lab</h1>
      </div>
      <div class="header-right">
        <div class="date" id="adminDateLabel">—</div>
      </div>
    </header>

    <main>
      <section id="admin-notifications" class="page active" data-page-target="admin-notifications" aria-labelledby="adminTitle">
        <div class="hero-card admin-hero-card">
          <div class="hero-prayers admin-hero-layout">
            <article class="ios-soft prayer-focus current admin-focus-card">
              <div class="prayer-focus-label" id="heroStatusLabel">Latest saved subscriber</div>
              <div class="prayer-focus-name admin-focus-title" id="heroStatusValue">Checking worker…</div>
              <div class="prayer-focus-time admin-focus-subtitle" id="heroStatusHint">The test button sends to the latest saved subscriber only.</div>
            </article>

            <article class="ios-soft prayer-focus next admin-focus-card admin-metric-card">
              <div class="prayer-focus-main">
                <div class="prayer-focus-label" id="workerHostLabel">Worker</div>
                <div class="prayer-focus-name admin-focus-title admin-metric-value" id="workerHostValue">—</div>
                <div class="prayer-focus-time admin-focus-subtitle" id="lastRefreshValue">Last refresh: —</div>
              </div>
            </article>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-header" id="adminSectionHeader">Notification testing</div>
          <div class="settings-list liquid-glass">
            <div class="settings-row settings-row-multiline">
              <span id="permissionLabel">Latest subscription update</span>
              <div class="settings-value settings-value-block" id="permissionValue">—</div>
            </div>
            <div class="settings-row settings-row-multiline">
              <span id="subscriptionLabel">Location name</span>
              <div class="settings-value settings-value-block" id="subscriptionValue">—</div>
            </div>
            <div class="settings-row settings-row-multiline">
              <span id="endpointLabel">Endpoint fingerprint</span>
              <div class="settings-value settings-value-block admin-mono" id="endpointValue">—</div>
            </div>
            <div class="settings-row settings-row-multiline">
              <span id="summaryLabel">Worker summary</span>
              <div class="settings-value settings-value-block" id="summaryValue">—</div>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-header" id="actionsHeader">Actions</div>
          <div class="settings-list liquid-glass admin-actions-card">
            <button class="settings-action-button" id="sendTestPushBtn" type="button">Send test notification to latest subscriber</button>
            <button class="settings-action-button settings-action-button-secondary" id="refreshAdminBtn" type="button">Refresh diagnostics</button>
          </div>
          <div class="settings-list liquid-glass admin-feedback-card" style="margin-top:12px;">
            <div class="settings-row settings-row-multiline">
              <span id="feedbackLabel">Result</span>
              <div class="settings-value settings-value-block" id="feedbackValue">Ready.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="tabbar-fixed-wrap">
      <nav class="ios-soft tabbar-capsule" id="tabBar">
        <div class="tab-active-pill" id="tabActivePill"></div>

        <button id="tabAdminNotifications" class="tab-btn active tab-btn-single" data-option="1" data-page-target="admin-notifications" type="button">
          <div class="tab-stack">
            <div class="tab-visual tab-visual-base">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.17V11a6 6 0 1 0-12 0v3.17c0 .53-.21 1.04-.59 1.43L4 17h5"/>
                <path d="M9 17a3 3 0 0 0 6 0"/>
              </svg>
              <span class="tab-label" id="tabAdminLabel">Notifications</span>
            </div>

            <div class="tab-visual tab-visual-accent" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.17V11a6 6 0 1 0-12 0v3.17c0 .53-.21 1.04-.59 1.43L4 17h5"/>
                <path d="M9 17a3 3 0 0 0 6 0"/>
              </svg>
              <span class="tab-label" id="tabAdminLabelAccent">Notifications</span>
            </div>
          </div>
        </button>
      </nav>
    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
